name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build
        run: dotnet build HltbDatasetPlugin.csproj -c Release

      - name: Upload unsigned artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: HLTB-unsigned
          path: bin/Release/net9.0-windows/HLTB.dll

  sign:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Sign with SignPath
        id: signing
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: hltb-dataset-plugin
          signing-policy-slug: release-signing
          github-artifact-id: ${{ needs.build.outputs.artifact-id }}
          output-artifact-directory: signed-output

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: signed-output/HLTB.dll
          generate_release_notes: true
