name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build
        run: dotnet build HltbDatasetPlugin.csproj -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HLTB-unsigned
          path: bin/Release/net9.0-windows/HLTB.dll
